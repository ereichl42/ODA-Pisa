<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PISA VS. EDUCATIONAL INVESTMENTS ANALYSIS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/countrySelectionBox.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/doubleRangeSlider.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/chart.css') }}">
    <style>
        .container {
            display: flex;
            flex-direction: column;
            width: 90%;
            margin: auto;
        }

        .controls {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .graph-container {
            width: 100%;
            height: 400px;
            margin-top: 20px;
        }

        #data-graph {
            width: 100% !important;
            height: 100% !important;
        }

        .slider-container {
            width: 100%;
            margin-bottom: 20px;
            position: relative;
        }

        .slider-scale {
            position: absolute;
            width: 100%;
            top: 40px;
            display: flex;
            justify-content: space-between;
        }

        .slider-scale span {
            font-size: 0.8em;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="controls">
            <div id="country-selection-box"></div>
            <div id="finance-metric-selection-box"></div>
            <div class="slider-container">
                <div id="year-range-slider"></div>
                <div class="slider-scale">
                    <span>2000</span><span>2022</span>
                </div>
                <label id="year-range-output">Years</label> <!-- Label for year range slider -->
            </div>
            <div class="slider-container">
                <div id="education-level-range-slider"></div>
                <div class="slider-scale">
                    <span>1</span><span>5</span>
                </div>
                <label id="education-level-output">Education level</label> <!-- Label for education level slider -->
            </div>
            <button id="apply-metric">Update Graph</button>
        </div>
        <div class="graph-container">
            <canvas id="data-graph"></canvas>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/nouislider/distribute/nouislider.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/nouislider/distribute/nouislider.min.css" rel="stylesheet">
    <script type="module" src="{{ url_for('static', filename='js/index.js') }}"></script>
</body>

</html>
